name: Update GitHub activity

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/update-github-activity.yml"
      - "scripts/build-github-activity.mjs"
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build-github-activity.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: tfritzy
      - name: Commit activity cache
        run: |
          git add github-activity.json

          if git diff --cached --quiet; then
            echo "No activity changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update GitHub activity cache"
          git push
