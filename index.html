<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tyler Fritz</title>
    <style>
      html {
        background-color: #0d1117;
        color: #dfeaf1;
      }
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      main {
        max-width: 1100px;
        margin: auto;
        padding: 40px 20px;
      }
      h1 {
        margin: 0 0 24px 0;
        font-weight: 500;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }
      .project {
        display: block;
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 16px;
        color: #dfeaf1;
        text-decoration: none;
        font-size: 1.05rem;
        font-weight: 600;
        transition: border-color 0.15s ease, background-color 0.15s ease;
      }
      .project:hover {
        border-color: #58a6ff;
        background-color: #1c232c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tyler Fritz — Projects</h1>
      <div class="grid">
        <a class="project" href="https://typerace.io">typerace.io</a>
        <a class="project" href="https://bufo.fun">bufo.fun</a>
        <a class="project" href="https://aces.cards">aces.cards</a>
        <a class="project" href="https://github.com/tfritzy/LunaVoxel">LunaVoxel</a>
        <a class="project" href="https://github.com/tfritzy/CommandLineTanks">Command Line Tanks</a>
        <a class="project" href="https://github.com/tfritzy/FactorialRevolution">Factorial Revolution</a>
        <a class="project" href="https://github.com/tfritzy/BastionWars">Bastion Wars</a>
        <a class="project" href="https://github.com/tfritzy/typeracing.io">typeracing.io</a>
        <a class="project" href="https://github.com/tfritzy/FactorySurvivalGame">Factory Survival Game</a>
        <a class="project" href="https://github.com/tfritzy/FactoryCoreLogic">Factory Core Logic</a>
        <a class="project" href="https://github.com/tfritzy/ZombieTyping">Zombie Typing</a>
        <a class="project" href="https://github.com/tfritzy/AcesCore">Aces Core</a>
        <a class="project" href="./braille.html">Braille Binary Order</a>
        <a class="project" href="https://play.google.com/store/apps/details?id=com.PineconeGames.FlybyNight">Fly by Night</a>
        <a class="project" href="https://github.com/tfritzy/HexagonTDF">Hex Grid Tower Defense</a>
      </div>
    </main>
  </body>
</html>
