<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tyler Fritz</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1117;
        color: #dfeaf1;
        font-family: Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1080px;
        margin: auto;
        padding: 44px 20px 64px;
      }

      a {
        color: inherit;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 500;
        line-height: 1;
      }

      .intro {
        max-width: 720px;
        margin: 0 0 28px;
        color: #aebbc5;
        line-height: 1.55;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 0 0 34px;
      }

      .link-pill {
        border: 1px solid #30363d;
        background: #161b22;
        color: #dfeaf1;
        min-height: 38px;
        padding: 9px 12px;
        text-decoration: none;
      }

      .link-pill:hover,
      .day-project:hover {
        color: #79c0ff;
      }

      .status {
        color: #8b949e;
        margin: 0 0 18px;
      }

      .timeline {
        display: grid;
      }

      .day {
        color: inherit;
        display: grid;
        grid-template-columns: 96px 26px minmax(0, 1fr);
        height: 26px;
        text-decoration: none;
      }

      .day-date {
        color: #8b949e;
        font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
        font-size: 0.78rem;
        line-height: 26px;
        padding-right: 12px;
        text-align: right;
      }

      .day.month-start .day-date {
        color: #c9d1d9;
        font-weight: 700;
      }

      .day-rail {
        position: relative;
      }

      .day.empty .day-rail::before {
        background: #2a313b;
        bottom: 0;
        content: "";
        left: 11px;
        opacity: 0.34;
        position: absolute;
        top: 0;
        width: 4px;
      }

      .rail-segment {
        background: var(--project-color);
        bottom: 0;
        left: calc(6px + (var(--lane) * 5px));
        position: absolute;
        top: 0;
        width: 4px;
      }

      .day-body {
        align-items: center;
        border-top: 1px solid #20262f;
        display: flex;
        gap: 10px;
        min-width: 0;
        padding-left: 12px;
      }

      .day.month-start .day-body {
        border-top-color: #30363d;
      }

      .day.empty .day-body {
        color: #59636e;
      }

      .day-projects {
        align-items: center;
        display: flex;
        gap: 14px;
        min-width: 0;
        overflow: hidden;
      }

      .day-project {
        color: var(--project-color);
        font-weight: 700;
        min-width: 0;
        overflow: hidden;
        position: relative;
        text-decoration: none;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .day-project + .day-project::before {
        background: #30363d;
        content: "";
        height: 12px;
        left: -7px;
        position: absolute;
        top: 3px;
        width: 1px;
      }

      @media (max-width: 680px) {
        main {
          padding: 32px 14px 48px;
        }

        .day {
          grid-template-columns: 72px 22px minmax(0, 1fr);
        }

        .day-date {
          padding-right: 8px;
        }

        .day.empty .day-rail::before {
          left: 9px;
        }

        .rail-segment {
          left: calc(4px + (var(--lane) * 5px));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tyler Fritz</h1>
      <p class="intro">
        A day-by-day calendar of the public projects I have been working on.
      </p>

      <nav class="links" aria-label="Project links">
        <a class="link-pill" href="https://typerace.io">typerace.io</a>
        <a class="link-pill" href="https://bufo.fun">bufo.fun</a>
        <a class="link-pill" href="https://aces.cards">aces.cards</a>
        <a class="link-pill" href="./braille.html">Braille Binary Order</a>
      </nav>

      <p class="status" id="status">Loading public activity...</p>
      <section class="timeline" id="timeline" aria-label="Daily project activity timeline"></section>
    </main>

    <script>
      const status = document.querySelector("#status");
      const timeline = document.querySelector("#timeline");
      let activityUsername = "tfritzy";
      const colors = [
        "#79c0ff",
        "#7ee787",
        "#ffa657",
        "#d2a8ff",
        "#ff7b72",
        "#a5d6ff",
        "#f2cc60",
        "#56d4dd",
      ];

      const fallbackActivity = {
        generatedAt: "2026-07-14T00:00:00Z",
        repoCount: 2,
        commitCount: 3,
        commits: [
          {
            repo: "PersonalSite",
            date: "2026-07-14T00:00:00Z",
            url: "https://github.com/tfritzy/PersonalSite",
            sha: "local-1",
          },
          {
            repo: "PersonalSite",
            date: "2026-07-13T23:00:00Z",
            url: "https://github.com/tfritzy/PersonalSite",
            sha: "local-2",
          },
          {
            repo: "typerace.io",
            date: "2026-07-10T00:00:00Z",
            url: "https://github.com/tfritzy/typerace.io",
            sha: "local-3",
          },
        ],
      };

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return entities[character];
        });
      }

      function dayKey(value) {
        return new Date(value).toISOString().slice(0, 10);
      }

      function localDateFromKey(key) {
        return new Date(`${key}T00:00:00Z`);
      }

      function addDays(date, days) {
        const next = new Date(date);

        next.setUTCDate(next.getUTCDate() + days);
        return next;
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("en", {
          month: "short",
          day: "numeric",
          year: "2-digit",
          timeZone: "UTC",
        }).format(new Date(value));
      }

      function formatMonth(key) {
        return new Intl.DateTimeFormat("en", {
          month: "short",
          year: "numeric",
          timeZone: "UTC",
        }).format(localDateFromKey(key));
      }

      function colorForRepo(repoName) {
        let hash = 0;

        for (const character of repoName) {
          hash = (hash * 31 + character.charCodeAt(0)) >>> 0;
        }

        return colors[hash % colors.length];
      }

      function daysBetween(startKey, endKey) {
        const days = [];
        let cursor = localDateFromKey(startKey);
        const end = localDateFromKey(endKey);

        while (cursor >= end) {
          days.push(cursor.toISOString().slice(0, 10));
          cursor = addDays(cursor, -1);
        }

        return days;
      }

      function dayBuckets(commits) {
        const buckets = new Map();

        commits.forEach((commit) => {
          const key = dayKey(commit.date);
          const bucket = buckets.get(key) || {
            key,
            commits: [],
            repos: new Map(),
          };
          const repo = bucket.repos.get(commit.repo) || {
            repo: commit.repo,
            count: 0,
            url: commit.url,
          };

          repo.count += 1;
          bucket.repos.set(commit.repo, repo);
          bucket.commits.push(commit);
          buckets.set(key, bucket);
        });

        return buckets;
      }

      function buildDayRows(commits) {
        const sorted = [...commits].sort((a, b) => new Date(b.date) - new Date(a.date));
        const buckets = dayBuckets(sorted);
        const newest = dayKey(sorted[0].date);
        const oldest = dayKey(sorted[sorted.length - 1].date);
        const days = daysBetween(newest, oldest);

        return days.map((key) => {
          const bucket = buckets.get(key);

          return {
            key,
            bucket,
          };
        });
      }

      function assignRailLanes(rows) {
        let previousLanes = new Map();

        rows.forEach((row) => {
          if (!row.bucket) {
            row.lanes = new Map();
            previousLanes = new Map();
            return;
          }

          const repos = [...row.bucket.repos.keys()];
          const lanes = new Map();
          const used = new Set();

          repos.forEach((repo) => {
            const lane = previousLanes.get(repo);

            if (lane !== undefined) {
              lanes.set(repo, lane);
              used.add(lane);
            }
          });

          repos
            .filter((repo) => !lanes.has(repo))
            .sort((a, b) => a.localeCompare(b))
            .forEach((repo) => {
              const lane = [1, 0, 2].find((candidate) => !used.has(candidate));

              lanes.set(repo, lane ?? 1);
              used.add(lane);
            });

          row.lanes = lanes;
          previousLanes = lanes;
        });
      }

      function renderTimeline(rows) {
        const fragment = document.createDocumentFragment();

        timeline.replaceChildren();
        assignRailLanes(rows);

        rows.forEach((row, index) => {
          const isActive = Boolean(row.bucket);
          const previous = rows[index - 1];
          const monthStart =
            index === 0 || row.key.slice(0, 7) !== previous.key.slice(0, 7);
          const day = document.createElement("div");
          const repos = isActive
            ? [...row.bucket.repos.values()].sort(
                (a, b) => row.lanes.get(a.repo) - row.lanes.get(b.repo)
              )
            : [];
          const labeledRepos = repos.filter(
            (repo) => !previous?.bucket?.repos.has(repo.repo)
          );
          const classes = [
            "day",
            isActive ? "active" : "empty",
            monthStart ? "month-start" : "",
          ]
            .filter(Boolean)
            .join(" ");

          day.className = classes;
          day.setAttribute(
            "aria-label",
            `${row.key}: ${isActive ? repos.map((repo) => repo.repo).join(", ") : "No public activity"}`
          );

          day.innerHTML = `
            <time class="day-date" datetime="${row.key}">${monthStart ? formatMonth(row.key) : ""}</time>
            <span class="day-rail" aria-hidden="true">
              ${repos
                .map(
                  (repo) =>
                    `<span class="rail-segment" style="--lane: ${row.lanes.get(repo.repo)}; --project-color: ${colorForRepo(repo.repo)}"></span>`
                )
                .join("")}
            </span>
            <span class="day-body">
              ${
                labeledRepos.length
                  ? `<span class="day-projects">${labeledRepos
                       .map(
                         (repo) =>
                           `<a class="day-project" style="--project-color: ${colorForRepo(repo.repo)}" href="https://github.com/${encodeURIComponent(activityUsername)}/${encodeURIComponent(repo.repo)}">${escapeHtml(repo.repo)}</a>`
                       )
                       .join("")}</span>`
                  : ""
              }
            </span>
          `;
          fragment.appendChild(day);
        });

        timeline.appendChild(fragment);
      }

      function render(activity, label) {
        activityUsername = activity.username || "tfritzy";
        const commits = [...activity.commits].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (commits.length === 0) {
          status.textContent = "No public commits found.";
          timeline.replaceChildren();
          return;
        }

        const dayRows = buildDayRows(commits);

        status.textContent =
          label ||
          `Public activity across ${activity.repoCount.toLocaleString()} repos. Updated ${formatDate(activity.generatedAt)}.`;
        renderTimeline(dayRows);
      }

      async function loadActivity() {
        try {
          const response = await fetch("./github-activity.json");

          if (!response.ok) {
            throw new Error(`Activity cache returned ${response.status}`);
          }

          render(await response.json());
        } catch {
          render(fallbackActivity, "Showing a small fallback activity sample");
        }
      }

      loadActivity();
    </script>
  </body>
</html>
