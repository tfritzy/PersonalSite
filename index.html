<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tyler Fritz</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0d1117;
        color: #dfeaf1;
        font-family: Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1080px;
        margin: auto;
        padding: 44px 20px 64px;
      }

      a {
        color: inherit;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 500;
        line-height: 1;
      }

      .intro {
        max-width: 720px;
        margin: 0 0 28px;
        color: #aebbc5;
        line-height: 1.55;
      }

      .day-project:hover {
        color: #79c0ff;
      }

      .status {
        color: #59636e;
        font-size: 0.82rem;
        margin: 0 0 18px;
      }

      .timeline {
        display: grid;
      }

      .day {
        color: inherit;
        display: grid;
        grid-template-columns: 96px 26px minmax(0, 1fr);
        height: 26px;
        text-decoration: none;
      }

      .day-date {
        color: #8b949e;
        font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
        font-size: 0.78rem;
        line-height: 26px;
        padding-right: 12px;
        text-align: right;
      }

      .day.month-start .day-date {
        color: #c9d1d9;
        font-weight: 700;
      }

      .day-rail {
        position: relative;
      }

      .day.empty .day-rail::before {
        background: #2a313b;
        bottom: 0;
        content: "";
        left: 11px;
        opacity: 0.34;
        position: absolute;
        top: 0;
        width: 4px;
      }

      .rail-segment {
        background: var(--rail-background);
        bottom: 0;
        left: 9px;
        position: absolute;
        top: 0;
        width: 8px;
      }

      .day-body {
        align-items: center;
        display: flex;
        gap: 10px;
        min-width: 0;
        padding-left: 12px;
      }

      .day-projects {
        align-items: center;
        display: flex;
        gap: 14px;
        min-width: 0;
        overflow: hidden;
      }

      .day-project {
        color: var(--project-color);
        font-weight: 700;
        min-width: 0;
        overflow: hidden;
        position: relative;
        text-decoration: none;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .day-project + .day-project::before {
        background: #30363d;
        content: "";
        height: 12px;
        left: -7px;
        position: absolute;
        top: 3px;
        width: 1px;
      }

      @media (max-width: 680px) {
        main {
          padding: 32px 14px 48px;
        }

        .day {
          grid-template-columns: 72px 22px minmax(0, 1fr);
        }

        .day-date {
          padding-right: 8px;
        }

        .day.empty .day-rail::before {
          left: 9px;
        }

        .rail-segment {
          left: 7px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tyler Fritz</h1>
      <p class="intro">
        Software engineer habitually doodling on side projects
      </p>

      <p class="status" id="status">Loading public activity...</p>
      <section class="timeline" id="timeline" aria-label="Daily project activity timeline"></section>
    </main>

    <script>
      const status = document.querySelector("#status");
      const timeline = document.querySelector("#timeline");
      let activityUsername = "tfritzy";
      const colors = [
        "#79c0ff",
        "#7ee787",
        "#ffa657",
        "#d2a8ff",
        "#ff7b72",
        "#a5d6ff",
        "#f2cc60",
        "#56d4dd",
      ];

      const fallbackActivity = {
        generatedAt: "2026-07-14T00:00:00Z",
        repoCount: 2,
        commitCount: 3,
        commits: [
          {
            repo: "PersonalSite",
            date: "2026-07-14T00:00:00Z",
            url: "https://github.com/tfritzy/PersonalSite",
            sha: "local-1",
          },
          {
            repo: "PersonalSite",
            date: "2026-07-13T23:00:00Z",
            url: "https://github.com/tfritzy/PersonalSite",
            sha: "local-2",
          },
          {
            repo: "typerace.io",
            date: "2026-07-10T00:00:00Z",
            url: "https://github.com/tfritzy/typerace.io",
            sha: "local-3",
          },
        ],
      };

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (character) => {
          const entities = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return entities[character];
        });
      }

      function dayKey(value) {
        return new Date(value).toISOString().slice(0, 10);
      }

      function localDateFromKey(key) {
        return new Date(`${key}T00:00:00Z`);
      }

      function addDays(date, days) {
        const next = new Date(date);

        next.setUTCDate(next.getUTCDate() + days);
        return next;
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("en", {
          month: "short",
          day: "numeric",
          year: "2-digit",
          timeZone: "UTC",
        }).format(new Date(value));
      }

      function formatMonth(key) {
        return new Intl.DateTimeFormat("en", {
          month: "short",
          year: "numeric",
          timeZone: "UTC",
        }).format(localDateFromKey(key));
      }

      function colorForRepo(repoName) {
        let hash = 0;

        for (const character of repoName) {
          hash = (hash * 31 + character.charCodeAt(0)) >>> 0;
        }

        return colors[hash % colors.length];
      }

      function daysBetween(startKey, endKey) {
        const days = [];
        let cursor = localDateFromKey(startKey);
        const end = localDateFromKey(endKey);

        while (cursor >= end) {
          days.push(cursor.toISOString().slice(0, 10));
          cursor = addDays(cursor, -1);
        }

        return days;
      }

      function dayBuckets(commits) {
        const buckets = new Map();

        commits.forEach((commit) => {
          const key = dayKey(commit.date);
          const bucket = buckets.get(key) || {
            key,
            commits: [],
            repos: new Map(),
          };
          const repo = bucket.repos.get(commit.repo) || {
            repo: commit.repo,
            count: 0,
            url: commit.url,
          };

          repo.count += 1;
          bucket.repos.set(commit.repo, repo);
          bucket.commits.push(commit);
          buckets.set(key, bucket);
        });

        return buckets;
      }

      function buildDayRows(commits) {
        const sorted = [...commits].sort((a, b) => new Date(b.date) - new Date(a.date));
        const buckets = dayBuckets(sorted);
        const newest = dayKey(sorted[0].date);
        const oldest = dayKey(sorted[sorted.length - 1].date);
        const days = daysBetween(newest, oldest);

        return days.map((key) => {
          const bucket = buckets.get(key);

          return {
            key,
            bucket,
          };
        });
      }

      function railBackground(repos) {
        const projectColors = repos.map((repo) => colorForRepo(repo.repo));

        if (projectColors.length <= 1) {
          return projectColors[0] || "#2a313b";
        }

        const bandWidth = 7;
        const stops = projectColors
          .map(
            (color, index) => {
              const start = index * bandWidth;
              const divider = (index + 1) * bandWidth - 1;
              const end = (index + 1) * bandWidth;

              return `${color} ${start}px ${divider}px, #0d1117 ${divider}px ${end}px`;
            }
          )
          .join(", ");

        return `repeating-linear-gradient(135deg, ${stops})`;
      }

      function hasSameProjects(current, previous) {
        if (!current?.bucket || !previous?.bucket) {
          return false;
        }

        const currentRepos = current.bucket.repos;
        const previousRepos = previous.bucket.repos;

        return (
          currentRepos.size === previousRepos.size &&
          [...currentRepos.keys()].every((repo) => previousRepos.has(repo))
        );
      }

      function renderTimeline(rows) {
        const fragment = document.createDocumentFragment();

        timeline.replaceChildren();

        rows.forEach((row, index) => {
          const isActive = Boolean(row.bucket);
          const previous = rows[index - 1];
          const monthStart =
            index === 0 || row.key.slice(0, 7) !== previous.key.slice(0, 7);
          const day = document.createElement("div");
          const repos = isActive
            ? [...row.bucket.repos.values()].sort((a, b) =>
                a.repo.localeCompare(b.repo)
              )
            : [];
          const labeledRepos = hasSameProjects(row, previous) ? [] : repos;
          const classes = [
            "day",
            isActive ? "active" : "empty",
            monthStart ? "month-start" : "",
          ]
            .filter(Boolean)
            .join(" ");

          day.className = classes;
          day.setAttribute(
            "aria-label",
            `${row.key}: ${isActive ? repos.map((repo) => repo.repo).join(", ") : "No public activity"}`
          );

          day.innerHTML = `
            <time class="day-date" datetime="${row.key}">${monthStart ? formatMonth(row.key) : ""}</time>
            <span class="day-rail" aria-hidden="true">
              ${isActive ? `<span class="rail-segment" style="--rail-background: ${railBackground(repos)}"></span>` : ""}
            </span>
            <span class="day-body">
              ${
                labeledRepos.length
                  ? `<span class="day-projects">${labeledRepos
                       .map(
                         (repo) =>
                           `<a class="day-project" style="--project-color: ${colorForRepo(repo.repo)}" href="https://github.com/${encodeURIComponent(activityUsername)}/${encodeURIComponent(repo.repo)}">${escapeHtml(repo.repo)}</a>`
                       )
                       .join("")}</span>`
                  : ""
              }
            </span>
          `;
          fragment.appendChild(day);
        });

        timeline.appendChild(fragment);
      }

      function render(activity) {
        activityUsername = activity.username || "tfritzy";
        const commits = [...activity.commits].sort((a, b) => new Date(b.date) - new Date(a.date));

        if (commits.length === 0) {
          status.textContent = "No public commits found.";
          timeline.replaceChildren();
          return;
        }

        const dayRows = buildDayRows(commits);

        status.textContent = `Last updated ${formatDate(activity.generatedAt)}.`;
        renderTimeline(dayRows);
      }

      async function loadActivity() {
        try {
          const response = await fetch("./github-activity.json");

          if (!response.ok) {
            throw new Error(`Activity cache returned ${response.status}`);
          }

          render(await response.json());
        } catch {
          render(fallbackActivity);
        }
      }

      loadActivity();
    </script>
  </body>
</html>
